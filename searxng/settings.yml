use_default_settings: true

general:
  instance_name: "Hermes SearXNG"
  privacypolicy_url: false
  contact_url: false
  enable_metrics: false
  donation_url: false

search:
  safe_search: 0
  autocomplete: google
  default_lang: en
  formats:
    - html
    - json
  languages:
    - en
    - id
  # Short suspension times — engines recover in minutes, not days
  suspended_times:
    SearxEngineAccessDenied: 600
    SearxEngineCaptcha: 600
    SearxEngineTooManyRequests: 300
    cf_SearxEngineCaptcha: 1800
    cf_SearxEngineAccessDenied: 1800
    recaptcha_SearxEngineCaptcha: 3600
  ban_time_on_fail: 3
  max_ban_time_on_fail: 60

server:
  secret_key: "$SEARXNG_SECRET"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: true
  public_instance: false
  image_proxy: false
  method: GET
  http_protocol_version: "1.1"
  base_url: "http://localhost:8880"

valkey:
  url: redis://searxng-redis:6379/0

ui:
  default_theme: simple
  simple_style: auto
  center_alignment: false

outgoing:
  request_timeout: 15.0
  max_request_timeout: 45.0
  retries: 2
  retry_on_http_error: [429, 503]
  enable_http2: true
  pool_connections: 200
  pool_maxsize: 50
  proxies:
    # Route through home proxy (residential CGNAT on JCG Q20).
    # Oracle Cloud IP triggers CAPTCHAs/rate limits on Google, DDG, Brave, etc.
    all://:
      - http://10.0.0.2:8888
  useragent_suffix: " (admin@wastu.net)"

