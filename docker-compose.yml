services:
  camofox-browser:
    build:
      context: /home/wastu/projects/camofox-browser
      args:
        - CAMOUFOX_VERSION=${CAMOUFOX_VERSION:-135.0.1}
        - CAMOUFOX_RELEASE=${CAMOUFOX_RELEASE:-beta.24}
        - ARCH=${ARCH:-x86_64}
    container_name: camofox-browser
    restart: unless-stopped
    ports:
      - "9377:9377"
    networks:
      - webstack-net
    environment:
      - PROXY_STRATEGY=single
      - PROXY_HOST=${PROXY_HOST:-10.0.0.2}
      - PROXY_PORT=${PROXY_PORT:-8888}
    volumes:
      - camofox-cache:/home/node/.cache/camoufox
      - camofox-config:/home/node/.config/camoufox
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9377/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  camofox-firecrawl-shim:
    build:
      context: ./firecrawl-shim
    container_name: camofox-firecrawl-shim
    restart: unless-stopped
    ports:
      - "33879:33879"
    networks:
      - webstack-net
    environment:
      - CAMOFOX_URL=http://camofox-browser:9377
      - CAMOFOX_FIRECRAWL_FIXED_USER_ID=${CAMOFOX_FIRECRAWL_FIXED_USER_ID:-agent}
      - CAMOFOX_FIRECRAWL_SHIM_HOST=0.0.0.0
      - LISTEN_PORT=33879
    depends_on:
      camofox-browser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:33879/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  webstack-net:
    driver: bridge

volumes:
  camofox-cache:
  camofox-config:
